name: DataLens CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  # ─── 1. Backend ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./datalens-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: datalens-backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit Tests - engine
        run: go test ./internal/engine/... -v -count=1 -timeout 120s

      - name: Unit Tests - parser
        run: go test ./internal/parser/... -v -count=1 -timeout 120s

      - name: Build binary
        run: go build -o /tmp/datalens-server ./cmd/server/

      - name: govulncheck (advisory only)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  # ─── 2. Frontend ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build

  # ─── 3. Smoke Tests (main/develop only) ────────────────────────────────────
  smoke:
    name: Smoke Tests (API)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datalens
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: datalens-backend/go.sum

      - name: Download modules
        working-directory: ./datalens-backend
        run: go mod download

      - name: Build and start backend
        working-directory: ./datalens-backend
        env:
          # ── Exact names from internal/config/config.go ──────────────────────
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/datalens?sslmode=disable"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "ci-smoke-test-secret-key-minimum-32chars!!"
          DB_CONN_ENCRYPTION_KEY: "ci-enc-key-32-chars-exactly-here"
          PORT: "8080"
          ENV: "test"
          CORS_ORIGINS: "*"
          # S3 optional — leave empty so MinIO is disabled gracefully
          S3_ENDPOINT: ""
          S3_ACCESS_KEY: ""
          S3_SECRET_KEY: ""
          S3_BUCKET: "datalens"
          # AI optional
          AI_API_KEY: ""
          # Do NOT serve static files in CI (no dist/ present)
          STATIC_DIR: ""
        run: |
          go build -o /tmp/datalens-server ./cmd/server/
          /tmp/datalens-server &
          SERVER_PID=$!
          echo "Server started (PID=$SERVER_PID), waiting for readiness..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1 || \
               curl -sf http://localhost:8080/api/v1/auth/me > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Verify server is actually responding
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/health 2>/dev/null || echo "000")
          echo "Health endpoint HTTP status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "ERROR: Server did not start. Check logs above."
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

      - name: Run smoke tests
        run: |
          chmod +x ./datalens-backend/scripts/smoke_test.sh
          ./datalens-backend/scripts/smoke_test.sh http://localhost:8080/api/v1

  # ─── 4. Docker Build (main only) ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./datalens-backend
          push: false
          tags: |
            datalens-backend:${{ github.sha }}
            datalens-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
